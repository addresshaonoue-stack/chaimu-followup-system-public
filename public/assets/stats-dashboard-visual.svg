<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 620" role="img" aria-labelledby="title desc">
  <title id="title">数据统计驾驶舱图像</title>
  <desc id="desc">展示随访完成率、量表趋势、不良反应发生率、依从性分布和单患者轨迹的数据统计界面</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8faf7"/>
      <stop offset="1" stop-color="#eef4ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#253b35" flood-opacity="0.14"/>
    </filter>
  </defs>
  <rect width="1120" height="620" rx="32" fill="url(#bg)"/>
  <text x="54" y="70" font-family="Microsoft YaHei, Arial" font-size="32" font-weight="900" fill="#1f2a24">真实世界随访数据统计</text>
  <text x="56" y="106" font-family="Microsoft YaHei, Arial" font-size="18" fill="#66736b">完成率、量表趋势、安全性记录与数据完整性动态统计</text>

  <g filter="url(#shadow)">
    <rect x="54" y="140" width="240" height="82" rx="18" fill="#ffffff"/>
    <rect x="314" y="140" width="240" height="82" rx="18" fill="#ffffff"/>
    <rect x="574" y="140" width="240" height="82" rx="18" fill="#ffffff"/>
    <rect x="834" y="140" width="232" height="82" rx="18" fill="#ffffff"/>
  </g>
  <text x="80" y="173" font-family="Microsoft YaHei, Arial" font-size="16" fill="#66736b">总患者数</text>
  <text x="80" y="205" font-family="Arial" font-size="32" font-weight="800" fill="#1f7a5c">20</text>
  <text x="340" y="173" font-family="Microsoft YaHei, Arial" font-size="16" fill="#66736b">综合随访完成率</text>
  <text x="340" y="205" font-family="Arial" font-size="32" font-weight="800" fill="#2563eb">85%</text>
  <text x="600" y="173" font-family="Microsoft YaHei, Arial" font-size="16" fill="#66736b">不良反应发生率</text>
  <text x="600" y="205" font-family="Arial" font-size="32" font-weight="800" fill="#b45309">0%</text>
  <text x="860" y="173" font-family="Microsoft YaHei, Arial" font-size="16" fill="#66736b">数据完整率</text>
  <text x="860" y="205" font-family="Arial" font-size="32" font-weight="800" fill="#1f7a5c">94%</text>

  <g filter="url(#shadow)">
    <rect x="54" y="252" width="480" height="286" rx="22" fill="#ffffff" stroke="#d9ded6"/>
    <rect x="562" y="252" width="238" height="286" rx="22" fill="#ffffff" stroke="#d9ded6"/>
    <rect x="828" y="252" width="238" height="286" rx="22" fill="#ffffff" stroke="#d9ded6"/>
  </g>
  <text x="84" y="294" font-family="Microsoft YaHei, Arial" font-size="20" font-weight="800" fill="#1f2a24">PSQI / GAD-7 / PHQ-9 趋势</text>
  <line x1="104" y1="480" x2="492" y2="480" stroke="#d9ded6"/>
  <line x1="104" y1="330" x2="104" y2="480" stroke="#d9ded6"/>
  <polyline points="112,358 184,380 256,398 328,410 400,426 486,438" fill="none" stroke="#1f7a5c" stroke-width="6" stroke-linecap="round"/>
  <polyline points="112,345 184,370 256,388 328,402 400,414 486,424" fill="none" stroke="#2563eb" stroke-width="6" stroke-linecap="round"/>
  <polyline points="112,372 184,384 256,410 328,400 400,432 486,444" fill="none" stroke="#b45309" stroke-width="6" stroke-linecap="round"/>
  <g font-family="Microsoft YaHei, Arial" font-size="14" fill="#66736b">
    <text x="104" y="506">基线</text><text x="178" y="506">7天</text><text x="250" y="506">14天</text><text x="322" y="506">28天</text><text x="394" y="506">56天</text><text x="468" y="506">84天</text>
  </g>

  <text x="594" y="294" font-family="Microsoft YaHei, Arial" font-size="20" font-weight="800" fill="#1f2a24">安全性记录</text>
  <circle cx="681" cy="390" r="74" fill="none" stroke="#e5e7eb" stroke-width="28"/>
  <circle cx="681" cy="390" r="74" fill="none" stroke="#1f7a5c" stroke-width="28" stroke-dasharray="464 464"/>
  <text x="653" y="399" font-family="Arial" font-size="34" font-weight="800" fill="#1f7a5c">0%</text>
  <text x="615" y="489" font-family="Microsoft YaHei, Arial" font-size="15" fill="#66736b">当前模拟随访数据未记录事件</text>

  <text x="858" y="294" font-family="Microsoft YaHei, Arial" font-size="20" font-weight="800" fill="#1f2a24">单患者轨迹</text>
  <rect x="862" y="326" width="168" height="34" rx="10" fill="#eef4ff"/>
  <text x="884" y="349" font-family="Arial" font-size="17" font-weight="800" fill="#2563eb">CMKY-2026-0001</text>
  <rect x="876" y="458" width="26" height="42" rx="6" fill="#1f7a5c"/>
  <rect x="916" y="426" width="26" height="74" rx="6" fill="#2563eb"/>
  <rect x="956" y="390" width="26" height="110" rx="6" fill="#b45309"/>
  <rect x="996" y="360" width="26" height="140" rx="6" fill="#64748b"/>
  <line x1="862" y1="500" x2="1036" y2="500" stroke="#d9ded6"/>
</svg>
