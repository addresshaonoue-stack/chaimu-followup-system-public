<body>
  <header class="topbar">
    <div class="shell topbar-inner">
      <a class="brand" href="index.html">
        <span class="brand-mark"><i class="fa fa-leaf"></i></span>
        <span>柴牡开郁颗粒真实世界研究与患者随访管理系统</span>
      </a>
      <nav class="nav">
        <a href="index.html"><i class="fa fa-home"></i> 首页</a>
        <a class="active" href="login.html"><i class="fa fa-sign-in"></i> 登录</a>
      </nav>
    </div>
  </header>

  <main class="shell page">
    <section class="grid cols-2">
      <div class="panel">
        <div class="panel-header">
          <h1 class="panel-title">账号登录</h1>
          <span class="pill info">机构内部使用</span>
        </div>
        <form id="loginForm" class="grid">
          <div class="field">
            <label for="username">用户名</label>
            <input id="username" name="username" autocomplete="username" required="">
          </div>
          <div class="field">
            <label for="password">密码</label>
            <input id="password" name="password" type="password" autocomplete="current-password" required="">
          </div>
          <button class="primary" type="submit"><i class="fa fa-sign-in"></i> 登录</button>
        </form>
      </div>

      <div class="panel">
        <div class="panel-header">
          <h2 class="panel-title">账号说明</h2>
        </div>
        <div class="grid">
          <div class="notice ok">
            <i class="fa fa-user-circle"></i>
            <div>云端首次启动时，通过环境变量 ADMIN_USERNAME 和 ADMIN_PASSWORD 创建初始管理员。</div>
          </div>
          <div class="notice ok">
            <i class="fa fa-stethoscope"></i>
            <div>医生账号由管理员在后台创建，医生登录后可管理本人负责的患者。</div>
          </div>
          <div class="notice">
            <i class="fa fa-lock"></i>
            <div>生产环境必须配置独立 SESSION_SECRET，并妥善保存管理员密码。</div>
          </div>
        </div>
      </div>
    </section>
  </main>

  
  


</body></html>
