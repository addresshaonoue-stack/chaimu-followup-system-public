<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>医生工作台 - 柴牡开郁颗粒真实世界研究与患者随访管理系统</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <header class="topbar">
    <div class="shell topbar-inner">
      <a class="brand" href="/">
        <span class="brand-mark"><i class="fa fa-leaf"></i></span>
        <span>医生工作台</span>
      </a>
      <nav class="nav">
        <a class="active" href="/doctor.html"><i class="fa fa-stethoscope"></i> 工作台</a>
        <a href="/research.html"><i class="fa fa-bar-chart"></i> 数据统计</a>
        <a href="/export.html"><i class="fa fa-download"></i> 数据导出</a>
        <button class="btn ghost" data-logout><i class="fa fa-sign-out"></i> 退出</button>
      </nav>
    </div>
  </header>

  <main class="shell page">
    <div class="panel-header">
      <div>
        <h1 class="panel-title">患者随访管理</h1>
        <div class="muted" data-current-user></div>
      </div>
      <button id="reloadPatients" class="btn"><i class="fa fa-refresh"></i></button>
    </div>

    <section id="quickFilterGrid" class="grid cols-3 section"></section>

    <section class="panel">
      <div class="panel-header">
        <h2 class="panel-title">创建患者档案</h2>
      </div>
      <form id="patientForm" class="form-grid">
        <div class="field"><label>姓名</label><input name="name" required></div>
        <div class="field"><label>性别</label><select name="sex" required><option>男</option><option>女</option><option>其他</option></select></div>
        <div class="field"><label>年龄</label><input name="age" type="number" min="0" max="120" required></div>
        <div class="field"><label>手机号</label><input name="phone" placeholder="可选填"></div>
        <div class="field"><label>诊断</label><input name="diagnosis" required></div>
        <div class="field"><label>中医证型</label><input name="tcm_syndrome" required></div>
        <div class="field"><label>开始用药日期</label><input name="medication_start_date" type="date" required></div>
        <div class="field"><label>知情同意</label><label class="check-row"><input name="consent_signed" type="checkbox" value="1"> 已签署</label></div>
        <div class="field full"><label>备注</label><textarea name="notes"></textarea></div>
        <div class="field full"><button class="primary" type="submit"><i class="fa fa-plus"></i> 新增患者</button></div>
      </form>
    </section>

    <section class="split section">
      <aside class="panel">
        <div class="panel-header">
          <h2 class="panel-title">患者列表</h2>
          <span id="patientCount" class="pill info">0</span>
        </div>
        <div id="patientList" class="list"></div>
      </aside>

      <section id="patientDetail" class="panel">
        <div class="empty">请选择患者</div>
      </section>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <script src="/common.js"></script>
  <script src="/doctor.js"></script>
</body>
</html>
